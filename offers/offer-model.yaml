# Offer — a sellable listing (Agent Commerce Protocol)
id: "fabric:primitive:offer"
name: "Offer"
version: "1.0.0"
layer: "domain"
question: "What is offered for sale, by whom, at what price?"
extends: ["fabric:primitive:thing"]
description: >
  A listing in the marketplace: a Product or Capability made available by a
  seller Identity at a price, sold UNDER one Operating Model and transacted over
  the Agent Commerce Protocol. The Offer is the ACP artifact a buyer agent
  discovers and turns into an Order. It is governed by listing Policy and bounded
  by Constraints (eligibility, price floors, rate limits).
schemaOrg:
  type: "schema:Offer"
  url: "https://schema.org/Offer"
  note: "Maps directly to schema:Offer (price, priceCurrency, availability, seller)."
jsonldContext:
  offer: "fabric:Offer"
attributes:
  - { name: id, type: string, required: true, schemaOrg: "schema:identifier" }
  - { name: name, type: string, required: true, schemaOrg: "schema:name" }
  - { name: price, type: number, required: false, schemaOrg: "schema:price", description: "Listed unit price." }
  - { name: currency, type: string, required: false, schemaOrg: "schema:priceCurrency", description: "ISO 4217 code, e.g. USD, or a token symbol." }
  - { name: unit, type: string, required: false, description: "Pricing unit: per-call | per-seat | per-token | per-month | flat." }
  - { name: status, type: string, required: false, schemaOrg: "schema:availability", description: "draft | listed | paused | sold-out | withdrawn." }
  - { name: sku, type: string, required: false, schemaOrg: "schema:sku" }
relationships:
  - { name: offeredBy, target: "fabric:primitive:identity", cardinality: "0..1", description: "Seller Identity (organization, person, or agent)." }
  - { name: sells, target: "fabric:primitive:product", cardinality: "0..*", description: "Product(s) packaged in this offer." }
  - { name: grants, target: "fabric:primitive:capability", cardinality: "0..*", description: "Capabilities the buyer obtains the right to exercise." }
  - { name: pricedIn, target: "fabric:primitive:resource", cardinality: "0..1", description: "Resource the price is denominated/drawn in (budget, tokens, quota)." }
  - { name: listedOn, target: "fabric:primitive:marketplace", cardinality: "0..1", description: "Marketplace venue hosting the listing." }
  - { name: soldUnder, target: "fabric:primitive:operating-model", cardinality: "0..1", description: "The single Operating Model (motion) this offer sells under." }
  - { name: transactedVia, target: "fabric:primitive:protocol", cardinality: "0..*", description: "Agent Commerce Protocol the offer is exchanged over." }
  - { name: constrainedBy, target: "fabric:primitive:constraint", cardinality: "0..*", description: "Eligibility, price-floor, and rate-limit constraints." }
  - { name: governedBy, target: "fabric:primitive:policy", cardinality: "0..*", description: "Listing / trust-and-safety policy." }
  - { name: hasState, target: "fabric:primitive:state", cardinality: "0..1", description: "Current lifecycle State of the listing." }
invariants:
  - "An Offer is sold under exactly one Operating Model; the motion fixes the buyer/seller Identity kinds."
  - "Price and currency are advisory until an Order references the Offer; the Order, not the Offer, is the commitment."
  - "Discovery, listing, and price changes are recorded as Events (everything important is a State advanced by an Event)."
examples:
  - { id: "offer:summarizer-pro", name: "Summarizer Pro (per-call)", price: 0.01, currency: "USD", unit: "per-call", status: "listed", sku: "AGT-SUM-PRO" }
